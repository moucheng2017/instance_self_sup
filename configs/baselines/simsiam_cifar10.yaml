name: simsiam-cifar10-baseline
seed: 42

dataset:
  name: cifar10
  image_size: 32
  num_workers: 0

model:
  name: simsiam
  backbone: resnet18
  projector_dim: 512
  proj_layers: null
  init_checkpoint: null
  init_load_backbone: true
  init_load_projector: false
  init_load_predictor: false

train:
  optimizer:
    name: sgd  # SGD, not LARS: these runs use small batches (<=256) where LARS gives no benefit
    weight_decay: 0.0005
    momentum: 0.9
  warmup_epochs: 10
  warmup_lr: 0
  base_lr: 0.05
  final_lr: 0
  grad_clip: 1.0
  num_epochs: 100
  stop_at_epoch: 100
  batch_size: 256
  subset_n: null
  subset_seed: 42
  knn_monitor: false
  knn_interval: 1
  knn_k: 20
  use_data_parallel: false
  saving_frequency: null

eval: false

logger:
  tensorboard: false
  matplotlib: true
  wandb: true            # on by default; logs training scalars to W&B
  wandb_project: instance_self_sup
  wandb_entity: null     # set to your W&B entity/team, or leave null
