name: sigmoid-pseudo-supervised-cifar10-colab
dataset:
  name: cifar10
  image_size: 32
  num_workers: 0

model:
  name: sigmoid_pseudo_supervised_net
  backbone: resnet18
  # Encode each image-index pseudo-label as a learnable vector, then score
  # image/label pairs with a SigLIP-style pairwise sigmoid loss.
  embedding_dim: 256
  normalize: True
  init_temperature: 10.0
  init_bias: -10.0

train:
  optimizer:
    name: sgd
    weight_decay: 0.0005
    disable_weight_decay: False
    momentum: 0.9
    beta1: 0.9
    beta2: 0.95
  warmup_epochs: 5
  warmup_lr: 0
  base_lr: 0.03
  final_lr: 0
  num_epochs: 100
  stop_at_epoch: 100
  batch_size: 128
  source_pool_size: 50000
  # augment_probability: 1.0
  source_subset_seed: 0
  knn_monitor: True
  knn_interval: 1
  knn_k: 200
  # Save an intermediate checkpoint every N completed epochs. Use null or 0 to disable.
  checkpoint_saving_frequency: 50
  use_data_parallel: False

eval: False

logger:
  tensorboard: False
  matplotlib: True

seed: null
