name: hierarchical-kway-vmf-ot-cifar10-colab
dataset:
  name: cifar10
  image_size: 32
  num_workers: 0

model:
  name: hierarchical_kway_vmf_ot_self_labeling_net
  backbone: resnet18
  # Unit-sphere embedding used by both the vMF tree refresh and the training loss.
  embedding_dim: 256
  # --- HiRef rank-annealing prior -------------------------------------------
  # rank_schedule sets the per-level branching factor (r_1, ..., r_kappa).
  # Coarse small ranks early, larger ranks later: the HiRef dynamic program
  # (Halmos et al., ICML 2025) yields exactly this shape. Provide an explicit
  # list to override the DP, or set it to null to derive the optimal schedule
  # from num_leaf_clusters / rank_schedule_max_rank.
  rank_schedule: [2, 4, 4, 8]
  # DP inputs, used only when rank_schedule is null. The derived schedule has
  # rank_schedule_depth levels, satisfies
  # prod(r_t) == num_leaf_clusters / rank_schedule_base_rank, and caps every
  # r_t <= rank_schedule_max_rank. Depth is a user budget (number of low-rank
  # OT calls), not auto-minimized, so the schedule anneals coarse -> fine.
  num_leaf_clusters: 256
  rank_schedule_depth: 4
  rank_schedule_max_rank: 16
  rank_schedule_base_rank: 1
  # Only the first supervised_depth (early, stable) levels emit pseudo-labels
  # for the backbone; deeper levels of the tree are still built (toward the
  # instance level) but produce no loss. null supervises all kappa levels.
  supervised_depth: 3
  # --- vMF / OT fitting ------------------------------------------------------
  # Forward loss concentration. Larger values make branch decisions sharper.
  kappa: 20.0
  # Entropic OT temperature used while fitting each K-way balanced vMF split.
  ot_epsilon: 0.05
  # K-way Sinkhorn needs more iterations than a binary split to balance.
  sinkhorn_iters: 15
  em_iters: 5
  # Unbalanced OT (semi-relaxed Sinkhorn): null keeps exact balanced transport.
  # A positive float relaxes the per-node component marginal with a KL penalty
  # of that strength; tau shares ot_epsilon's cost units and the
  # balanced->natural transition happens around tau ~ ot_epsilon. The trainer's
  # tau schedule overrides this per epoch.
  ot_unbalanced_tau: 5.0
  # Collapse guard for unbalanced hard splits: if any child would receive fewer
  # than this fraction of a node's samples, that node refits balanced.
  ot_unbalanced_min_split_fraction: 0.05
  # Build the K-way pseudo-label tree from each mini-batch instead of refreshing
  # over the whole source pool.
  batch_self_labeling: True
  # If true, the tree's vMF directions are nn.Parameter values used by the
  # branch-prediction loss. Batch OT still creates pseudo-label paths.
  learnable_vmf_prototypes: False
  # Optional memory for the prototype tree. null disables EMA; 0.9 keeps 90% of
  # previous tree directions and mixes in 10% of the current batch-fitted tree.
  prototype_ema_momentum: 0.9
  # Auxiliary SigLIP-style image-index prediction loss (linearly ramped).
  sigmoid_regularization_weight: 0.0
  sigmoid_init_temperature: 1.0
  sigmoid_init_bias: -6.236

train:
  optimizer:
    name: adam
    weight_decay: 0.0
    momentum: 0.9
    beta1: 0.9
    beta2: 0.95
  warmup_epochs: 10
  warmup_lr: 0
  base_lr: 0.001
  final_lr: 0
  num_epochs: 100
  stop_at_epoch: 100
  batch_size: 512
  source_pool_size: 50000
  augment_probability: 1.0
  source_subset_seed: 0
  samples_per_epoch: 20480
  # Full-pool relabeling is disabled when model.batch_self_labeling is true.
  tree_refresh_interval: 0
  tree_refresh_batch_size: 1024
  # Depth annealing (staircase) is clamped to model.supervised_depth: starting
  # from depth_annealing_initial_depth active levels, one more level is
  # supervised every depth_annealing_epochs_per_level epochs, never exceeding
  # supervised_depth. null disables annealing (supervised_depth levels active
  # from epoch 0).
  depth_annealing_epochs_per_level: null
  depth_annealing_initial_depth: 1
  # Unbalanced-OT tau schedule: cosine-anneal model.ot_unbalanced_tau from
  # unbalanced_tau_start (epoch 0, nearly balanced) to unbalanced_tau_final
  # over unbalanced_tau_anneal_epochs. null unbalanced_tau_final disables it.
  unbalanced_tau_start: 5.0
  unbalanced_tau_final: 0.02
  unbalanced_tau_anneal_epochs: 400
  sigmoid_regularization_rampup_epochs: 20
  # Per-level purity/NMI diagnostics (tree path prefixes vs true labels) via
  # the model's read-only predict_paths descent over clean memory-loader
  # images. Diagnostic only; 0 disables. Plotted in the standalone
  # monitor_tree_structure.svg.
  tree_metrics_interval: 1
  tree_metrics_max_samples: 10000
  knn_monitor: True
  knn_interval: 1
  knn_k: 200
  checkpoint_saving_frequency: 50
  use_data_parallel: False

eval: False

logger:
  tensorboard: False
  matplotlib: True

seed: null
