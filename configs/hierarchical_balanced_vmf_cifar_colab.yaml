name: hierarchical-balanced-vmf-cifar10-colab
dataset:
  name: cifar10
  image_size: 32
  num_workers: 0

model:
  name: hierarchical_balanced_vmf_self_labeling_net
  backbone: resnet18
  # Unit-sphere embedding used by both the vMF tree refresh and the training loss.
  embedding_dim: 256
  # A depth-8 balanced binary tree creates up to 256 spherical leaves.
  depth: 8
  # Forward loss concentration. Larger values make branch decisions sharper.
  kappa: 20.0
  # Entropic OT temperature used while fitting each 2-way balanced vMF split.
  ot_epsilon: 0.05
  # flat_ot usually needs more iterations or a larger ot_epsilon than binary modes.
  sinkhorn_iters: 3
  em_iters: 5
  # Unbalanced OT (semi-relaxed Sinkhorn): null keeps the exact balanced
  # transport. A positive float relaxes the per-node component marginal with a
  # KL penalty of that strength; tau shares ot_epsilon's cost units and the
  # balanced->natural transition happens around tau ~ ot_epsilon.
  ot_unbalanced_tau: null
  # Collapse guard for unbalanced hard splits: if a child would receive fewer
  # than this fraction of a node's samples, that node falls back to the
  # balanced median split.
  ot_unbalanced_min_split_fraction: 0.05
  # hierarchical_vmf_ot: recursive spherical/vMF OT
  # hierarchical_vmf: recursive spherical/vMF fitting with unconstrained assignments
  # recursive_ot: recursive Euclidean balanced OT without vMF mean directions
  # flat_ot: non-recursive K-way Euclidean balanced OT, where K = 2 ** depth
  # flat_vmf_ot: non-recursive K-way spherical/vMF balanced OT, where K can be
  #   set with flat_vmf_num_components
  # vmf: non-recursive K-way spherical/vMF fitting with unconstrained assignments
  ot_assignment_mode: hierarchical_vmf_ot
  # Used only by flat_vmf_ot. null keeps the legacy flat K = 2 ** depth default.
  flat_vmf_num_components: null
  # Build the hierarchical Sinkhorn/vMF pseudo-label tree from each mini-batch
  # instead of refreshing labels over the whole source pool.
  batch_self_labeling: True
  # If true, the tree's vMF directions are nn.Parameter values used by the
  # branch-prediction loss. Batch OT still creates pseudo-label paths.
  learnable_vmf_prototypes: False
  # Optional memory for the prototype tree. null disables EMA; 0.9 keeps 90% of
  # previous tree directions and mixes in 10% of the current batch-fitted tree.
  prototype_ema_momentum: 0.9
  # Warm start: initialize each node's 2-way EM from the node's stored
  # prototypes (temporal continuity of the tree) instead of re-deriving
  # farthest-point seeds from the data at every refresh/batch. Nodes that were
  # never fitted are still cold-seeded. False keeps the legacy behavior.
  tree_warm_start: False
  # Node-health bookkeeping for selective re-seeding. A node whose branch
  # accuracy (measured against its own stored targets) stays below
  # reseed_acc_threshold for reseed_patience consecutive epochs is a re-seed
  # candidate; augmentation-unstable cuts sit near chance (0.5) forever, so
  # they self-flag. Nodes visited fewer than reseed_min_node_samples times in
  # an epoch are ignored that round. null disables streak tracking.
  reseed_acc_threshold: null
  reseed_patience: 3
  reseed_min_node_samples: 64
  # Live trigger: cold-restart candidate nodes (and their subtrees) at the
  # next tree build, worst accuracy first, at most reseed_budget_fraction of
  # the measured nodes per epoch. Requires tree_warm_start=True and a
  # non-null reseed_acc_threshold. Keep False for logging-only calibration.
  reseed_enabled: False
  reseed_budget_fraction: 0.1
  # Auxiliary SigLIP-style image-index prediction loss. It is multiplied by the
  # linearly ramped train.sigmoid_regularization_rampup_epochs coefficient.
  sigmoid_regularization_weight: 0.1
  sigmoid_init_temperature: 1.0
  # Roughly -log(batch_size - 1) for the default batch_size=512.
  sigmoid_init_bias: -6.236

train:
  optimizer:
    name: adam
    weight_decay: 0.0
    momentum: 0.9
    beta1: 0.9
    beta2: 0.95
  warmup_epochs: 10
  warmup_lr: 0
  base_lr: 0.001
  final_lr: 0
  num_epochs: 100
  stop_at_epoch: 100
  batch_size: 512
  source_pool_size: 50000
  augment_probability: 1.0
  source_subset_seed: 0
  samples_per_epoch: 20480
  # Full-pool relabeling is disabled when model.batch_self_labeling is true.
  tree_refresh_interval: 0
  tree_refresh_batch_size: 1024
  # Depth annealing (staircase): starting from depth_annealing_initial_depth
  # active tree levels, activate one more level every
  # depth_annealing_epochs_per_level epochs. Levels beyond the active depth
  # are still built but produce no loss, so the backbone is not supervised on
  # fine-scale splits of an unconsolidated feature space. null disables
  # annealing (all model.depth levels are supervised from epoch 0).
  depth_annealing_epochs_per_level: null
  depth_annealing_initial_depth: 1
  # Unbalanced-OT tau schedule: cosine-anneal model.ot_unbalanced_tau from
  # unbalanced_tau_start (epoch 0, nearly balanced) to unbalanced_tau_final
  # over unbalanced_tau_anneal_epochs. null unbalanced_tau_final disables the
  # schedule (the model keeps its constructor tau, or stays exactly balanced).
  unbalanced_tau_start: null
  unbalanced_tau_final: null
  unbalanced_tau_anneal_epochs: 0
  sigmoid_regularization_rampup_epochs: 20
  knn_monitor: True
  knn_interval: 1
  knn_k: 200
  checkpoint_saving_frequency: 50
  use_data_parallel: False

eval: False

logger:
  tensorboard: False
  matplotlib: True

seed: null
